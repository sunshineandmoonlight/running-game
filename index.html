<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%2305070f'/%3E%3Ccircle cx='32' cy='32' r='16' fill='%2356f2ff'/%3E%3Cpath d='M12 46h40' stroke='%2318e8ff' stroke-width='5'/%3E%3C/svg%3E"
    />
    <title>霓虹金币跑酷</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <section class="hud" aria-label="game status">
        <div class="metric">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="metric">
          <span>Coins</span>
          <strong id="coins">0</strong>
        </div>
        <div class="metric">
          <span>Best</span>
          <strong id="best">0</strong>
        </div>
        <div class="metric">
          <span>Progress</span>
          <strong id="progress">0%</strong>
        </div>
      </section>
      <section class="overlay" id="overlay">
        <div class="panel">
          <p class="eyebrow">Three.js 3D Runner</p>
          <h1>霓虹金币跑酷</h1>
          <p id="message">左右换道并跳跃，收集金币，越过矮墙，避开高障碍和断裂平台。</p>
          <div class="actions">
            <button id="start-button" type="button">开始游戏</button>
            <button id="pause-button" type="button">暂停</button>
          </div>
          <p class="controls">A / D 左右换道，Space / W 跳跃，P 暂停，R 重新开始</p>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

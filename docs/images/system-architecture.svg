<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#35536b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#8aa0b3" flood-opacity="0.28"/>
    </filter>
  </defs>
  <style>
    .bg { fill: #fbfdff; }
    .heading { font: 700 28px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #17324d; }
    .box { stroke: #7aa0bd; stroke-width: 1.5; filter: url(#shadow); }
    .title { font: 700 17px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #18334d; text-anchor: middle; }
    .body { font: 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #36546c; text-anchor: middle; }
    .arrow { stroke: #35536b; stroke-width: 2.1; fill: none; }
  </style>
  <rect width="100%" height="100%" class="bg"/>
  <text x="520" y="38" class="heading" text-anchor="middle">系统总体架构图</text>
  <path d="M 240 105 L 330 105" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 540 105 L 630 105" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 630 105 L 300 271" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 630 105 L 560 271" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 740 140 L 725 230" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 430 431 L 510 431" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 625 390 L 740 140" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 740 140 L 875 390" class="arrow" marker-end="url(#arrowhead)" />
  <g>
  <rect x="70" y="70" width="170" height="70" rx="14" fill="#e8f7ff" class="box" />
  <text x="155" y="97" class="title">用户输入</text>
  <text x="155" y="114" class="body">键盘 / 鼠标</text>
<text x="155" y="134" class="body">开始、暂停、跳跃、换道</text>
</g>
<g>
  <rect x="330" y="70" width="210" height="70" rx="14" fill="#f0f7ff" class="box" />
  <text x="435" y="97" class="title">运行窗口</text>
  <text x="435" y="114" class="body">浏览器 / Electron</text>
<text x="435" y="134" class="body">承载 Canvas 与 UI</text>
</g>
<g>
  <rect x="630" y="70" width="220" height="70" rx="14" fill="#effbf5" class="box" />
  <text x="740" y="97" class="title">src/main.js</text>
  <text x="740" y="114" class="body">场景初始化</text>
<text x="740" y="134" class="body">动画循环 / 生成逻辑</text>
</g>
<g>
  <rect x="90" y="230" width="210" height="82" rx="14" fill="#fff6df" class="box" />
  <text x="195" y="257" class="title">Three.js 渲染层</text>
  <text x="195" y="274" class="body">WebGL Renderer</text>
<text x="195" y="294" class="body">Scene / Camera / Light</text>
</g>
<g>
  <rect x="370" y="230" width="190" height="82" rx="14" fill="#eef4ff" class="box" />
  <text x="465" y="257" class="title">状态管理</text>
  <text x="465" y="274" class="body">game/state.js</text>
<text x="465" y="294" class="body">分数 / 速度 / 跳跃</text>
</g>
<g>
  <rect x="630" y="230" width="190" height="82" rx="14" fill="#fff0f4" class="box" />
  <text x="725" y="257" class="title">碰撞检测</text>
  <text x="725" y="274" class="body">game/collision.js</text>
<text x="725" y="294" class="body">AABB / 车道过滤</text>
</g>
<g>
  <rect x="220" y="390" width="210" height="82" rx="14" fill="#f2f8e9" class="box" />
  <text x="325" y="417" class="title">模型资源层</text>
  <text x="325" y="434" class="body">public/models/kenney</text>
<text x="325" y="454" class="body">GLB 模型 / 贴图</text>
</g>
<g>
  <rect x="510" y="390" width="230" height="82" rx="14" fill="#f8f0ff" class="box" />
  <text x="625" y="417" class="title">模型兜底机制</text>
  <text x="625" y="434" class="body">game/model.js</text>
<text x="625" y="454" class="body">不可见模型 -&gt; 几何体</text>
</g>
<g>
  <rect x="780" y="390" width="190" height="82" rx="14" fill="#edf7f7" class="box" />
  <text x="875" y="417" class="title">桌面发布</text>
  <text x="875" y="434" class="body">Electron Builder</text>
<text x="875" y="454" class="body">免安装 exe</text>
</g>
</svg>
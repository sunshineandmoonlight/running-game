<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="600" viewBox="0 0 1140 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#35536b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#8aa0b3" flood-opacity="0.28"/>
    </filter>
  </defs>
  <style>
    .bg { fill: #fbfdff; }
    .heading { font: 700 28px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #17324d; }
    .box { stroke: #7aa0bd; stroke-width: 1.5; filter: url(#shadow); }
    .title { font: 700 17px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #18334d; text-anchor: middle; }
    .body { font: 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #36546c; text-anchor: middle; }
    .arrow { stroke: #35536b; stroke-width: 2.1; fill: none; }
  </style>
  <rect width="100%" height="100%" class="bg"/>
  <text x="570" y="38" class="heading" text-anchor="middle">碰撞检测与误判修复流程图</text>
  <path d="M 250 110 L 330 110" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 520 110 L 600 110" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 810 110 L 870 110" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 870 110 L 300 295" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 870 110 L 560 295" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 870 110 L 820 295" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 965 145 L 990 260" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 730 330 L 745 430" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 900 295 L 850 465" class="arrow" marker-end="url(#arrowhead)" />
  <g>
  <rect x="60" y="75" width="190" height="70" rx="14" fill="#e8f7ff" class="box" />
  <text x="155" y="102" class="title">活动对象</text>
  <text x="155" y="119" class="body">金币 / 跳板 / 障碍</text>
</g>
<g>
  <rect x="330" y="75" width="190" height="70" rx="14" fill="#f0f7ff" class="box" />
  <text x="425" y="102" class="title">装饰物过滤</text>
  <text x="425" y="119" class="body">光门 / 门框跳过</text>
</g>
<g>
  <rect x="600" y="75" width="210" height="70" rx="14" fill="#effbf5" class="box" />
  <text x="705" y="102" class="title">车道过滤</text>
  <text x="705" y="119" class="body">使用玩家可见 x 坐标</text>
<text x="705" y="139" class="body">确定当前车道</text>
</g>
<g>
  <rect x="870" y="75" width="190" height="70" rx="14" fill="#fff6df" class="box" />
  <text x="965" y="102" class="title">AABB 检测</text>
  <text x="965" y="119" class="body">x/y/z 三轴重叠</text>
</g>
<g>
  <rect x="120" y="260" width="180" height="70" rx="14" fill="#f2f8e9" class="box" />
  <text x="210" y="287" class="title">金币</text>
  <text x="210" y="304" class="body">加金币数和分数</text>
</g>
<g>
  <rect x="380" y="260" width="180" height="70" rx="14" fill="#eef4ff" class="box" />
  <text x="470" y="287" class="title">跳板</text>
  <text x="470" y="304" class="body">触发更高跳跃</text>
</g>
<g>
  <rect x="640" y="260" width="180" height="70" rx="14" fill="#f8f0ff" class="box" />
  <text x="730" y="287" class="title">低障碍</text>
  <text x="730" y="304" class="body">高度足够则通过</text>
</g>
<g>
  <rect x="900" y="260" width="180" height="70" rx="14" fill="#fff0f4" class="box" />
  <text x="990" y="287" class="title">高障碍</text>
  <text x="990" y="304" class="body">必须换道躲避</text>
</g>
<g>
  <rect x="640" y="430" width="210" height="70" rx="14" fill="#edf7f7" class="box" />
  <text x="745" y="457" class="title">失败处理</text>
  <text x="745" y="474" class="body">显示触发对象信息</text>
<text x="745" y="494" class="body">最终得分</text>
</g>
</svg>
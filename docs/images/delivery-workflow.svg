    .title { font: 700 17px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #18334d; text-anchor: middle; }
    .body { font: 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #36546c; text-anchor: middle; }
    .arrow { stroke: #35536b; stroke-width: 2.1; fill: none; }
  </style>
  <rect width="100%" height="100%" class="bg"/>
  <text x="570" y="38" class="heading" text-anchor="middle">构建、测试与课程提交流程图</text>
  <path d="M 260 116 L 340 116" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 530 116 L 610 116" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 800 116 L 880 116" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 165 152 L 360 285" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 260 116 L 570 323" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 360 361 L 545 470" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 680 361 L 545 470" class="arrow" marker-end="url(#arrowhead)" />
<path d="M 880 116 L 670 508" class="arrow" marker-end="url(#arrowhead)" />
  <g>
  <rect x="70" y="80" width="190" height="72" rx="14" fill="#e8f7ff" class="box" />
  <text x="165" y="107" class="title">源代码</text>
  <text x="165" y="124" class="body">src / public / electron</text>
</g>
<g>
  <rect x="340" y="80" width="190" height="72" rx="14" fill="#effbf5" class="box" />
